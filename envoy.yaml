# Self-hosted PM2: Envoy gRPC-JSON transcoder → local gRPC on 50051.
# proto.pb must exist beside this file (run ./generate.sh from backend/).
# Envoy process cwd should be this directory (see ecosystem.config.js).

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: grpc_json
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/v1/"
                          route:
                            cluster: grpc_backend
                            timeout: 30s
                        - match:
                            prefix: "/lifeos."
                          route:
                            cluster: grpc_backend
                            timeout: 30s
                      cors:
                        allow_origin_string_match:
                          - prefix: "*"
                        allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                        allow_headers: "authorization, content-type, x-grpc-web, x-api-key"
                        max_age: "86400"
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.grpc_json_transcoder
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                      proto_descriptor: proto.pb
                      services:
                        - lifeos.AuthService
                        - lifeos.TaskService
                        - lifeos.HydrationService
                        - lifeos.PartnerService
                        - lifeos.SleepService
                        - lifeos.AiService
                        - lifeos.SyncService
                        - lifeos.HealthService
                        - lifeos.AutomationService
                        - lifeos.ApiKeyService
                        - lifeos.WebhookService
                        - lifeos.CoachDataService
                        - lifeos.PushNotificationService
                      print_options:
                        add_whitespace: true
                        always_print_primitive_fields: true
                        always_print_enums_as_ints: false
                        preserve_proto_field_names: true
                      convert_grpc_status: true
                      ignore_unknown_query_parameters: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: grpc_backend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: grpc_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 50051
