# Self-hosted runner on the production host (same pattern as pocketbridge-backend).
# Requires: clone this repo on the runner machine and point LIFEOS_BACKEND_ROOT there.
# Runner user must be able to run `sudo systemctl restart pm2-zarbie.service` (deploy.sh).

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-lifeos-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      LIFEOS_BACKEND_ROOT: /home/zarbie/lifeos-backend
    steps:
      - name: Pull and deploy
        run: |
          set -euo pipefail
          cd "${LIFEOS_BACKEND_ROOT}"
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          exec bash scripts/deploy.sh
