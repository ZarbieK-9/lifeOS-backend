# Backend-only repo: SSH to server, pull this repo, run scripts/deploy.sh
#
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
# Server: clone at e.g. /home/zarbie/lifeos-backend (set LIFEOS_BACKEND_ROOT on host or edit cd path below)

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST:-}" && test -n "${DEPLOY_USER:-}" && test -n "${DEPLOY_SSH_KEY:-}" || {
            echo "Missing DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY repository secrets."
            exit 1
          }
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/lifeos_deploy
          chmod 600 ~/.ssh/lifeos_deploy
          ssh -i ~/.ssh/lifeos_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -s' << 'REMOTE_SCRIPT'
          set -euo pipefail
          cd "${LIFEOS_BACKEND_ROOT:-/home/zarbie/lifeos-backend}"
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          exec bash scripts/deploy.sh
          REMOTE_SCRIPT
