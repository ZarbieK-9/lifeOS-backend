# test: GitHub-hosted ubuntu-latest (pytest).
# deploy: self-hosted runner on your server (same idea as pocketbridge-backend) — no inbound SSH.
#
# Server one-time: run scripts/register-self-hosted-runner.sh with a registration token, then
#   cd ~/actions-runner-lifeos && sudo ./svc.sh install && sudo ./svc.sh start

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lifeos-backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Pull and deploy on server
        run: |
          set -euo pipefail
          cd /home/zarbie/lifeos-backend
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          exec bash scripts/deploy.sh
