syntax = "proto3";

package lifeos;

import "google/api/annotations.proto";

// ─── Common ─────────────────────────────────────────

message Empty {}

// ─── Auth ───────────────────────────────────────────

message RegisterRequest {
  string username = 1;
  string password = 2;
  string display_name = 3;
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = { post: "/v1/auth/register" body: "*" };
  }
  rpc Login(LoginRequest) returns (TokenPair) {
    option (google.api.http) = { post: "/v1/auth/login" body: "*" };
  }
  rpc Refresh(RefreshRequest) returns (TokenPair) {
    option (google.api.http) = { post: "/v1/auth/refresh" body: "*" };
  }
}

// ─── Tasks ──────────────────────────────────────────

message Task {
  string task_id = 1;
  string user_id = 2;
  string title = 3;
  string due_date = 4;
  string priority = 5;     // low | medium | high
  string notes = 6;
  string status = 7;       // pending | completed | overdue
  string created_at = 8;
  string updated_at = 9;
  string recurrence = 10;  // e.g. "daily", "every Monday", "weekly"
}

message ListTasksRequest {}
message ListTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string task_id = 1;
  string title = 2;
  string due_date = 3;
  string priority = 4;
  string notes = 5;
  string status = 6;
  string created_at = 7;
  string recurrence = 8;
}

message UpdateTaskRequest {
  string task_id = 1;
  string title = 2;
  string due_date = 3;
  string priority = 4;
  string notes = 5;
  string status = 6;
  string recurrence = 7;
}

message DeleteTaskRequest {
  string task_id = 1;
}

service TaskService {
  rpc List(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = { get: "/v1/tasks" };
  }
  rpc Create(CreateTaskRequest) returns (Task) {
    option (google.api.http) = { post: "/v1/tasks" body: "*" };
  }
  rpc Update(UpdateTaskRequest) returns (Task) {
    option (google.api.http) = { put: "/v1/tasks/{task_id}" body: "*" };
  }
  rpc Delete(DeleteTaskRequest) returns (Empty) {
    option (google.api.http) = { delete: "/v1/tasks/{task_id}" };
  }
}

// ─── Hydration ──────────────────────────────────────

message HydrationLog {
  string log_id = 1;
  string user_id = 2;
  int32 amount_ml = 3;
  string timestamp = 4;
  bool synced = 5;
}

message ListHydrationRequest {}
message ListHydrationResponse {
  repeated HydrationLog logs = 1;
}

message LogHydrationRequest {
  string log_id = 1;
  int32 amount_ml = 2;
  string timestamp = 3;
}

service HydrationService {
  rpc List(ListHydrationRequest) returns (ListHydrationResponse) {
    option (google.api.http) = { get: "/v1/hydration" };
  }
  rpc Log(LogHydrationRequest) returns (HydrationLog) {
    option (google.api.http) = { post: "/v1/hydration" body: "*" };
  }
}

// ─── Partner ────────────────────────────────────────

message PartnerSnippet {
  string snippet_id = 1;
  string user_id = 2;
  string partner_id = 3;
  string content = 4;
  string timestamp = 5;
  bool synced = 6;
}

message ListSnippetsRequest {}
message ListSnippetsResponse {
  repeated PartnerSnippet snippets = 1;
}

message SendSnippetRequest {
  string snippet_id = 1;
  string partner_id = 2;
  string content = 3;
  string timestamp = 4;
}

service PartnerService {
  rpc ListSnippets(ListSnippetsRequest) returns (ListSnippetsResponse) {
    option (google.api.http) = { get: "/v1/partner/snippets" };
  }
  rpc SendSnippet(SendSnippetRequest) returns (PartnerSnippet) {
    option (google.api.http) = { post: "/v1/partner/snippets" body: "*" };
  }
}

// ─── Sleep ──────────────────────────────────────────

message SleepSession {
  string session_id = 1;
  string user_id = 2;
  string sleep_start = 3;
  string sleep_end = 4;
  int32 duration_minutes = 5;
}

message ListSleepRequest {}
message ListSleepResponse {
  repeated SleepSession sessions = 1;
}

message RecordSleepRequest {
  string session_id = 1;
  string sleep_start = 2;
  string sleep_end = 3;
  int32 duration_minutes = 4;
}

service SleepService {
  rpc List(ListSleepRequest) returns (ListSleepResponse) {
    option (google.api.http) = { get: "/v1/sleep" };
  }
  rpc Record(RecordSleepRequest) returns (SleepSession) {
    option (google.api.http) = { post: "/v1/sleep" body: "*" };
  }
}

// ─── AI ─────────────────────────────────────────────

message AiCommand {
  string id = 1;
  string user_id = 2;
  string input = 3;
  string output = 4;
  string status = 5;      // pending | executed | queued | failed | gemini | fallback
  string created_at = 6;
}

message ToolIntent {
  string tool = 1;          // tool name from the registry (e.g. "add_task")
  string params_json = 2;   // JSON-encoded parameter map
}

message SubmitAiRequest {
  string id = 1;
  string input = 2;
  string context_json = 3;  // serialized app state (calendar, emails, tasks, etc.)
}

message SubmitAiResponse {
  string id = 1;
  string output = 2;                   // AI's conversational text
  string status = 3;                   // gemini | fallback | error
  repeated ToolIntent intents = 4;     // tool calls for frontend to execute
}

message AiHistoryRequest {}
message AiHistoryResponse {
  repeated AiCommand commands = 1;
}

message TranscribeRequest {
  bytes audio = 1;
  string content_type = 2;
}

message TranscribeResponse {
  string text = 1;
}

// ─── Agentic Loop ──────────────────────────────────

message ToolResultMsg {
  string tool = 1;            // tool name (e.g. "query_tasks")
  bool success = 2;
  string message = 3;         // human-readable result text
  string data_json = 4;       // optional structured data (JSON string)
}

// First turn: set input + context_json (tool_results empty).
// Continuation: set session_id + tool_results (input empty).
message AgentTurnRequest {
  string session_id = 1;
  string input = 2;
  string context_json = 3;
  repeated ToolResultMsg tool_results = 4;
}

message AgentTurnResponse {
  string session_id = 1;
  string output = 2;
  repeated ToolIntent intents = 3;
  bool done = 4;
  int32 turn = 5;
  string status = 6;          // gemini | fallback | error
}

service AiService {
  rpc Submit(SubmitAiRequest) returns (SubmitAiResponse) {
    option (google.api.http) = { post: "/v1/ai/command" body: "*" };
  }
  rpc AgentTurn(AgentTurnRequest) returns (AgentTurnResponse) {
    option (google.api.http) = { post: "/v1/ai/agent-turn" body: "*" };
  }
  rpc History(AiHistoryRequest) returns (AiHistoryResponse) {
    option (google.api.http) = { get: "/v1/ai/history" };
  }
  rpc Transcribe(TranscribeRequest) returns (TranscribeResponse) {
    option (google.api.http) = { post: "/v1/ai/transcribe" body: "*" };
  }
}

// ─── Automation ────────────────────────────────────

message AutomationRule {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string description = 4;
  string rule_type = 5;        // schedule | condition
  string schedule = 6;         // cron expression
  string condition = 7;        // JSON rules-engine condition
  string actions = 8;          // JSON array of {tool, params}
  bool enabled = 9;
  string last_triggered = 10;
  string created_at = 11;
}

message ListRulesRequest {}
message ListRulesResponse {
  repeated AutomationRule rules = 1;
}

message CreateRuleRequest {
  string name = 1;
  string description = 2;
  string rule_type = 3;
  string schedule = 4;
  string condition = 5;
  string actions = 6;
  bool enabled = 7;
}

message UpdateRuleRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string schedule = 4;
  string condition = 5;
  string actions = 6;
  bool enabled = 7;
}

message DeleteRuleRequest {
  string id = 1;
}

service AutomationService {
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse) {
    option (google.api.http) = { get: "/v1/automation/rules" };
  }
  rpc CreateRule(CreateRuleRequest) returns (AutomationRule) {
    option (google.api.http) = { post: "/v1/automation/rules" body: "*" };
  }
  rpc UpdateRule(UpdateRuleRequest) returns (AutomationRule) {
    option (google.api.http) = { put: "/v1/automation/rules/{id}" body: "*" };
  }
  rpc DeleteRule(DeleteRuleRequest) returns (Empty) {
    option (google.api.http) = { delete: "/v1/automation/rules/{id}" };
  }
}

// ─── API Keys (external integrations) ───────────────

message CreateApiKeyRequest {
  string name = 1;
}

message CreateApiKeyResponse {
  string key_id = 1;
  string api_key = 2;
  string name = 3;
  string created_at = 4;
}

message ListApiKeysRequest {}

message ApiKeyInfo {
  string key_id = 1;
  string name = 2;
  string created_at = 3;
  string last_used = 4;
  string key_prefix = 5;
}

message ListApiKeysResponse {
  repeated ApiKeyInfo keys = 1;
}

message RevokeApiKeyRequest {
  string key_id = 1;
}

service ApiKeyService {
  rpc Create(CreateApiKeyRequest) returns (CreateApiKeyResponse) {
    option (google.api.http) = { post: "/v1/apikeys" body: "*" };
  }
  rpc List(ListApiKeysRequest) returns (ListApiKeysResponse) {
    option (google.api.http) = { get: "/v1/apikeys" };
  }
  rpc Revoke(RevokeApiKeyRequest) returns (Empty) {
    option (google.api.http) = { delete: "/v1/apikeys/{key_id}" };
  }
}

// ─── Webhook (API-key auth for external services) ───

message WebhookCommandRequest {
  string input = 1;
}

message WebhookCommandResponse {
  string output = 1;
  string status = 2;
}

service WebhookService {
  rpc Command(WebhookCommandRequest) returns (WebhookCommandResponse) {
    option (google.api.http) = { post: "/v1/webhook/command" body: "*" };
  }
}

// ─── Sync (offline queue drain) ─────────────────────

message SyncEvent {
  string id = 1;
  string type = 2;          // hydration | task_create | task_update | ai_command | mqtt_publish
  string payload = 3;       // JSON string
  string created_at = 4;
}

message SyncBatchRequest {
  repeated SyncEvent events = 1;
}

message SyncBatchResponse {
  int32 processed = 1;
  repeated string failed = 2;  // IDs of events that failed
}

service SyncService {
  rpc Batch(SyncBatchRequest) returns (SyncBatchResponse) {
    option (google.api.http) = { post: "/v1/sync/batch" body: "*" };
  }
}

// ─── Coach data sync (optional multi-device / backup) ─
// Stubs: implement persistence when enabling cloud sync for the mobile app.

message CoachingCommitmentRecord {
  string id = 1;
  string suggestion = 2;
  string reason = 3;
  string date_suggested = 4;
  string date_due = 5;
  bool adopted = 6;
  string outcome = 7;
  string created_at = 8;
}

message UpsertCoachingCommitmentsRequest {
  repeated CoachingCommitmentRecord commitments = 1;
}

message UpsertCoachingCommitmentsResponse {
  int32 upserted = 1;
}

message ExpenseRecord {
  string id = 1;
  double amount = 2;
  string currency = 3;
  string category = 4;
  string description = 5;
  string date = 6;
  string created_at = 7;
}

message UpsertExpensesRequest {
  repeated ExpenseRecord expenses = 1;
}

message UpsertExpensesResponse {
  int32 upserted = 1;
}

message CoachNotification {
  string id = 1;
  string domain = 2;
  string title = 3;
  string body = 4;
  string priority = 5;
  bool read = 6;
  string rule_id = 7;
  string created_at = 8;
}

message ListCoachNotificationsRequest {
  bool unread_only = 1;
  int32 limit = 2;
}

message ListCoachNotificationsResponse {
  repeated CoachNotification notifications = 1;
}

message MarkCoachNotificationsReadRequest {
  repeated string ids = 1;
}

message MarkCoachNotificationsReadResponse {
  int32 updated = 1;
}

message MarkCoachNotificationsActedRequest {
  repeated string ids = 1;
}

message MarkCoachNotificationsActedResponse {
  int32 updated = 1;
}

message ListCoachingCommitmentsRequest {}

message ListCoachingCommitmentsResponse {
  repeated CoachingCommitmentRecord commitments = 1;
}

service CoachDataService {
  rpc UpsertCoachingCommitments(UpsertCoachingCommitmentsRequest) returns (UpsertCoachingCommitmentsResponse) {
    option (google.api.http) = { post: "/v1/coach/commitments" body: "*" };
  }
  rpc UpsertExpenses(UpsertExpensesRequest) returns (UpsertExpensesResponse) {
    option (google.api.http) = { post: "/v1/coach/expenses" body: "*" };
  }
  rpc ListCoachNotifications(ListCoachNotificationsRequest) returns (ListCoachNotificationsResponse) {
    option (google.api.http) = { get: "/v1/coach/notifications" };
  }
  rpc MarkCoachNotificationsRead(MarkCoachNotificationsReadRequest) returns (MarkCoachNotificationsReadResponse) {
    option (google.api.http) = { post: "/v1/coach/notifications/read" body: "*" };
  }
  rpc MarkCoachNotificationsActed(MarkCoachNotificationsActedRequest) returns (MarkCoachNotificationsActedResponse) {
    option (google.api.http) = { post: "/v1/coach/notifications/acted" body: "*" };
  }
  rpc ListCoachingCommitments(ListCoachingCommitmentsRequest) returns (ListCoachingCommitmentsResponse) {
    option (google.api.http) = { get: "/v1/coach/commitments/list" };
  }
}

// Register device token for future FCM/APNs remote nudges (Expo push or native).

message RegisterPushTokenRequest {
  string device_id = 1;
  string token = 2;
  string platform = 3;
}

service PushNotificationService {
  rpc RegisterPushToken(RegisterPushTokenRequest) returns (Empty) {
    option (google.api.http) = { post: "/v1/push/register" body: "*" };
  }
}

// ─── Health ─────────────────────────────────────────

message HealthResponse {
  string status = 1;
  string db = 2;
  string mqtt = 3;
}

service HealthService {
  rpc Check(Empty) returns (HealthResponse) {
    option (google.api.http) = { get: "/v1/health" };
  }
}
